version: '3.8'

services:
  mysql:
    image: mariadb:10.11
    container_name: nsokiss_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nsokiss
    command: --sql-mode=""
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo:4.4
    container_name: nsokiss_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  game-server:
    build: .
    container_name: nsokiss_game_server
    ports:
      - "14444:14444"
    depends_on:
      - mysql
      - mongodb
    restart: always
    volumes:
      - ./Data:/app/Data

  caddy:
    image: caddy:2
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./www:/srv
      - caddy_data:/data
      - caddy_config:/config

  web-admin:
    build: ./web-admin
    container_name: nsokiss_web_admin
    restart: always
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: nsotien_0
    depends_on:
      - mysql

volumes:
  mysql_data:
  mongo_data:
  caddy_data:
  caddy_config:
